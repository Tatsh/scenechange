jobs:
  build-linux:
    permissions:
      contents: 'read'
    runs-on: '${{ matrix.arch.runner }}'
    steps:
      - uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10'
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: 'Install dependencies'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
      - name: 'Fetch VapourSynth headers'
        run: >-
          git clone --depth 1 --branch R72
          https://github.com/vapoursynth/vapoursynth.git
          '${{ github.workspace }}/vendor/vapoursynth'
      - name: 'Configure'
        run: >-
          cmake -G Ninja -B '${{ github.workspace }}/build'
          --install-prefix '${{ github.workspace }}/build/prefix'
          -DCMAKE_BUILD_TYPE='${{ matrix.build-type }}'
          -DVAPOURSYNTH_INCLUDE_DIR='${{ github.workspace }}/vendor/vapoursynth/include'
      - name: 'Build'
        run: 'cmake --build ${{ github.workspace }}/build --verbose'
      - name: 'Package'
        run: >-
          cpack -C '${{ matrix.build-type }}'
          --config '${{ github.workspace }}/build/CPackConfig.cmake'
          -B '${{ github.workspace }}/build' --verbose
      - name: 'Upload artefacts'
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a'
        with:
          if-no-files-found: 'error'
          name: 'scenechange-${{ matrix.build-type }}-linux-${{ matrix.arch.suffix }}'
          path: '${{ github.workspace }}/build/scenechange-*-linux-*.zip'
    strategy:
      fail-fast: false
      matrix:
        arch:
          - runner: 'ubuntu-latest'
            suffix: 'x86_64'
          - runner: 'ubuntu-24.04-arm'
            suffix: 'arm64'
        build-type: ['Debug', 'Release']
  build-macos:
    permissions:
      contents: 'read'
    runs-on: '${{ matrix.os.runner }}'
    steps:
      - uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10'
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: 'Install dependencies'
        run: 'brew install ninja vapoursynth'
      - name: 'Configure'
        run: >-
          cmake -G Ninja -B '${{ github.workspace }}/build'
          --install-prefix '${{ github.workspace }}/build/prefix'
          -DCMAKE_BUILD_TYPE='${{ matrix.build-type }}'
      - name: 'Build'
        run: 'cmake --build ${{ github.workspace }}/build --verbose'
      - name: 'Package'
        run: >-
          cpack -C '${{ matrix.build-type }}'
          --config '${{ github.workspace }}/build/CPackConfig.cmake'
          -B '${{ github.workspace }}/build' --verbose
      - name: 'Upload artefacts'
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a'
        with:
          if-no-files-found: 'error'
          name: 'scenechange-${{ matrix.build-type }}-macos-${{ matrix.os.suffix }}'
          path: '${{ github.workspace }}/build/scenechange-*-macos-*.zip'
    strategy:
      fail-fast: false
      matrix:
        build-type: ['Debug', 'Release']
        os:
          - runner: 'macos-latest'
            suffix: 'arm64'
          - runner: 'macos-15-intel'
            suffix: 'x86_64'
  build-windows:
    permissions:
      attestations: 'write'
      contents: 'write'
      id-token: 'write'
    runs-on: '${{ matrix.sys.runner }}'
    steps:
      - id: 'fixed_workspace'
        name: 'Fix path'
        run: >-
          echo out=$("${{ github.workspace }}" -Replace "\\","/") | Out-File
          -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10'
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: 'Fetch VapourSynth headers'
        env:
          WS: '${{ steps.fixed_workspace.outputs.out }}'
        shell: 'bash'
        run: |
          git clone --depth 1 --branch R72 https://github.com/vapoursynth/vapoursynth.git \
            "$WS/vendor/vapoursynth"
      - name: 'Configure'
        env:
          WS: '${{ steps.fixed_workspace.outputs.out }}'
        run: >-
          cmake -G "Visual Studio 17 2022" -A ${{ matrix.sys.cmake_arch }}
          -B "$env:WS/build"
          --install-prefix "$env:WS/build/prefix"
          -DCMAKE_BUILD_TYPE='${{ matrix.build-type }}'
          -DVAPOURSYNTH_INCLUDE_DIR="$env:WS/vendor/vapoursynth/include"
      - name: 'Build'
        env:
          WS: '${{ steps.fixed_workspace.outputs.out }}'
        run: >-
          cmake --build "$env:WS/build"
          --config '${{ matrix.build-type }}' --verbose
      - name: 'Package'
        env:
          WS: '${{ steps.fixed_workspace.outputs.out }}'
        run: >-
          cpack -C '${{ matrix.build-type }}'
          --config "$env:WS/build/CPackConfig.cmake"
          -B "$env:WS/build" --verbose
      - name: 'Upload artefacts'
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a'
        with:
          if-no-files-found: 'error'
          name: 'scenechange-${{ matrix.build-type }}-windows-${{ matrix.sys.arch }}'
          path: '${{ steps.fixed_workspace.outputs.out }}/build/scenechange-*-windows-*.zip'
      - if: "matrix.build-type == 'Release'"
        name: 'Attest'
        uses: 'actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32'
        with:
          subject-path: |
            ${{ steps.fixed_workspace.outputs.out }}/build/scenechange-*-windows-*.zip
      - if: "github.ref_type == 'tag' && matrix.build-type == 'Release'"
        env:
          GH_TOKEN: '${{ github.token }}'
          WS: '${{ steps.fixed_workspace.outputs.out }}'
        name: 'Upload to draft release'
        run: |
          files=("$WS"/build/scenechange-*-windows-*.zip)
          gh release create "$GITHUB_REF_NAME" --draft --notes '' "${files[@]}" ||
            gh release upload "$GITHUB_REF_NAME" "${files[@]}" --clobber
        shell: 'bash'
    strategy:
      fail-fast: false
      matrix:
        build-type: ['Debug', 'Release']
        sys:
          - arch: 'x86_64'
            cmake_arch: 'x64'
            runner: 'windows-latest'
          - arch: 'arm64'
            cmake_arch: 'ARM64'
            runner: 'windows-11-arm'
name: 'CMake'
'on':
  pull_request:
    branches:
      - 'master'
  push:
    branches:
      - 'master'
    tags:
      - 'v*.*.*'
permissions: {}
