env:
  CODEQL_EXTRACTOR_CPP_AUTOINSTALL_DEPENDENCIES: 'false'
jobs:
  analyze:
    name: 'analyse'
    permissions:
      actions: 'read'
      contents: 'read'
      security-events: 'write'
    runs-on: 'ubuntu-latest'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v6'
        with:
          fetch-depth: 0
      - name: 'Install dependencies'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
      - name: 'Fetch VapourSynth headers'
        run: >-
          git clone --depth 1 --branch R72
          https://github.com/vapoursynth/vapoursynth.git
          '${{ github.workspace }}/vendor/vapoursynth'
      - name: 'Initialize CodeQL'
        uses: 'github/codeql-action/init@v4'
        with:
          languages: '${{ matrix.language }}'
      - name: 'Configure'
        run: >-
          cmake -G Ninja -B '${{ github.workspace }}/build'
          -DVAPOURSYNTH_INCLUDE_DIR='${{ github.workspace }}/vendor/vapoursynth/include'
      - name: 'Build'
        run: 'cmake --build ${{ github.workspace }}/build --verbose'
      - name: 'Perform CodeQL Analysis'
        uses: 'github/codeql-action/analyze@v4'
        with:
          category: '/language:${{ matrix.language }}'
    strategy:
      fail-fast: false
      matrix:
        language: ['cpp']
name: 'CodeQL'
'on':
  pull_request:
    branches:
      - 'master'
  push:
    branches:
      - 'master'
  schedule:
    - cron: '42 10 * * 4'
