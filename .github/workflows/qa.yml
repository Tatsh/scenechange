jobs:
  format:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10'
        with:
          persist-credentials: false
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b'
      - name: 'Set up Python'
        uses: 'actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405'
        with:
          python-version: '3.12'
      - name: 'Install dependencies (uv)'
        run: 'uv sync --group dev --all-extras'
      - name: 'Check formatting (Ruff)'
        run: 'uv run ruff format --check .'
  mypy:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10'
        with:
          persist-credentials: false
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b'
      - name: 'Set up Python'
        uses: 'actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405'
        with:
          python-version: '3.14'
      - name: 'Install dependencies (uv)'
        run: 'uv sync --group dev --group tests --all-extras'
      - name: 'Lint with mypy'
        run: 'uv run mypy .'
  pyright:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10'
        with:
          persist-credentials: false
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b'
      - name: 'Set up Python'
        uses: 'actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405'
        with:
          python-version: '3.14'
      - name: 'Install dependencies (uv)'
        run: 'uv sync --group dev --group tests --all-extras'
      - name: 'Yarn cache'
        uses: 'actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae'
        with:
          key: "${{ runner.os }}-yarn-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}"
          path: '~/.yarn/berry'
          restore-keys: '${{ runner.os }}-yarn'
      - name: 'Install dependencies (Yarn)'
        run: 'yarn'
      - name: 'Lint with Pyright'
        run: 'yarn pyright'
  ruff:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10'
        with:
          persist-credentials: false
      - name: 'Lint with Ruff'
        uses: 'astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b'
  ty:
    runs-on: 'ubuntu-latest'
    steps:
      - uses: 'actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10'
        with:
          persist-credentials: false
      - name: 'Install uv'
        uses: 'astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b'
      - name: 'Set up Python'
        uses: 'actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405'
        with:
          python-version: '3.14'
      - name: 'Install dependencies (uv)'
        run: 'uv sync --group dev --group tests --all-extras'
      - name: 'Lint with ty'
        run: 'uv run ty check'
name: 'QA'
'on':
  pull_request:
    branches:
      - 'master'
    paths:
      - '**/*.py'
      - '**/*.pyi'
      - '.github/workflows/qa.yml'
      - 'pyproject.toml'
      - 'tests/pyproject.toml'
  push:
    branches:
      - 'master'
    paths:
      - '**/*.py'
      - '**/*.pyi'
      - '.github/workflows/qa.yml'
      - 'pyproject.toml'
      - 'tests/pyproject.toml'
permissions:
  contents: 'read'
